name: Deploy Pelatih Registrasi Silat

on:
  push:
    branches:
      - main
      
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/12atif/pelatih-registrasi-silat:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 103.253.212.243
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/12atif/pelatih-registrasi-silat:latest
            docker stop silat_pelatih || true
            docker rm silat_pelatih || true
            docker run -d -p 8002:80 --name silat_pelatih --network silat_net \
              -v /var/silat/storage/app/public:/var/www/app/storage/app/public \
              -e APP_ENV=production \
              -e APP_KEY=${{ secrets.APP_KEY_PELATIH }} \
              -e APP_URL=https://unperopen.com \
              -e DB_CONNECTION=pgsql \
              -e DB_HOST=silat_db \
              -e DB_PORT=5432 \
              -e DB_DATABASE=silat_db \
              -e DB_USERNAME=silat_user \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SESSION_DRIVER=file \
              -e CACHE_STORE=file \
              -e QUEUE_CONNECTION=sync \
              ghcr.io/12atif/pelatih-registrasi-silat:latest
